# Publish docs/wiki/ → GitHub Wiki when wiki sources change.
#
# Prerequisites (once per repo):
# 1. Settings → Features → Wikis: enabled
# 2. Create the first wiki page in the UI (initializes <repo>.wiki.git)
# 3. Workflow permissions: Settings → Actions → General →
#    Workflow permissions → Read and write (or use a PAT with wiki scope)
#
# Local dry-run:
#   WIKI_DRY_RUN=1 bash scripts/sync-wiki.sh

name: Sync GitHub Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'doc/wiki/**'
      - 'scripts/sync-wiki.sh'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-wiki
  cancel-in-progress: true

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync doc/wiki to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: bash scripts/sync-wiki.sh
