name: flutter_qjs_es2023
description: QuickJS ES2023 bindings for Flutter and Dart through dart:ffi, with native support for Android, iOS, macOS, Linux, and Windows.
version: 0.0.1
homepage: https://github.com/NanCunChild/flutter_qjs_es2023
repository: https://github.com/NanCunChild/flutter_qjs_es2023
issue_tracker: https://github.com/NanCunChild/flutter_qjs_es2023/issues
topics:
  - quickjs
  - javascript
  - es2023
  - ffi
  - flutter-plugin

environment:
  sdk: ^3.10.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: FlutterQjsPlugin
      linux:
        pluginClass: FlutterQjsPlugin
      android:
        pluginClass: FlutterQjsPlugin
        package: io.github.nancunchild.flutter_qjs_es2023
      macos:
        pluginClass: FlutterQjsPlugin
      ios:
        pluginClass: FlutterQjsPlugin
  assets:
    - assets/js/
